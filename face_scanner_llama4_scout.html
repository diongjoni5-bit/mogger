<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .container {
    width: 100%;
    max-width: 600px;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
    animation: fadeIn 0.8s ease-out;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 600;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: #94a3b8;
    font-size: 14px;
  }

  .key-input-section {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(0, 255, 255, 0.3);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 30px;
    animation: slideUp 0.6s ease-out;
  }

  .key-input-section h3 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    color: #60a5fa;
  }

  .key-input-section p {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .key-input-section p a {
    color: #0ff;
    text-decoration: underline;
  }

  .input-wrapper {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }

  #apiKeyInput {
    flex: 1;
    min-width: 200px;
    padding: 12px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 255, 255, 0.2);
    border-radius: 8px;
    color: #0ff;
    font-size: 13px;
    font-family: monospace;
    transition: all 0.3s ease;
  }

  #apiKeyInput::placeholder {
    color: rgba(0, 255, 255, 0.4);
  }

  #apiKeyInput:focus {
    outline: none;
    border-color: #0ff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    background: rgba(0, 0, 0, 0.5);
  }

  .button-group {
    display: flex;
    gap: 8px;
  }

  .save-key-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, #0ff, #0891b2);
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .save-key-btn:hover {
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    transform: translateY(-2px);
  }

  .save-key-btn:active {
    transform: translateY(0);
  }

  .toggle-btn {
    padding: 12px 16px;
    background: rgba(0, 255, 255, 0.2);
    border: 1px solid rgba(0, 255, 255, 0.4);
    border-radius: 8px;
    color: #0ff;
    cursor: pointer;
    font-weight: 600;
    font-size: 12px;
    transition: all 0.3s ease;
  }

  .toggle-btn:hover {
    background: rgba(0, 255, 255, 0.3);
  }

  .key-status {
    font-size: 13px;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-weight: 600;
    transition: all 0.3s ease;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .key-status.valid {
    background: rgba(52, 211, 153, 0.2);
    color: #34d399;
    border: 1px solid rgba(52, 211, 153, 0.5);
    animation: pulse-green 0.5s ease-out;
  }

  .key-status.invalid {
    background: rgba(248, 113, 113, 0.2);
    color: #f87171;
    border: 1px solid rgba(248, 113, 113, 0.5);
    animation: shake 0.5s ease-out;
  }

  .key-status.empty {
    background: rgba(148, 163, 184, 0.2);
    color: #94a3b8;
    border: 1px solid rgba(148, 163, 184, 0.5);
  }

  @keyframes pulse-green {
    0% { transform: scale(0.95); opacity: 0.8; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .camera-container {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin: 0 auto 30px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    display: none;
  }

  .camera-container.active {
    display: block;
    animation: slideUp 0.6s ease-out;
  }

  #video {
    width: 100%;
    display: block;
    background: #000;
  }

  .scan-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0;
  }

  .scan-overlay.active {
    animation: scanPulse 0.5s ease-out;
  }

  @keyframes scanPulse {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  .scan-line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #0ff, transparent);
    top: 50%;
    animation: scanDown 2s ease-in-out infinite;
  }

  @keyframes scanDown {
    0% { top: 0%; opacity: 0; }
    50% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    font-weight: 700;
    color: #0ff;
    text-shadow: 0 0 20px #0ff;
    opacity: 0;
    animation: countdownPop 1s ease-out forwards;
  }

  @keyframes countdownPop {
    0% { 
      opacity: 1;
      transform: translate(-50%, -50%) scale(0.5);
    }
    70% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1);
    }
  }

  .controls {
    text-align: center;
  }

  .scan-btn {
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, #0ff, #0891b2);
    color: #000;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .scan-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
  }

  .scan-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .tier-badge {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .tier-mogger {
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #78350f;
  }

  .tier-chad {
    background: linear-gradient(135deg, #34d399, #10b981);
    color: #065f46;
  }

  .tier-sub5 {
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    color: #1e3a8a;
  }

  .tier-sub3 {
    background: linear-gradient(135deg, #f87171, #ef4444);
    color: #7f1d1d;
  }

  .tier-chopped {
    background: linear-gradient(135deg, #a78bfa, #8b5cf6);
    color: #3f2d70;
  }

  .ratings-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-top: 20px;
  }

  .rating-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 16px;
    border-radius: 12px;
    animation: ratingFadeIn 0.6s ease-out;
  }

  @keyframes ratingFadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .rating-label {
    font-size: 12px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .rating-value {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #0ff, #0891b2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .loading {
    text-align: center;
    padding: 20px;
    color: #0ff;
  }

  .spinner {
    display: inline-block;
    width: 30px;
    height: 30px;
    border: 3px solid rgba(0, 255, 255, 0.2);
    border-top-color: #0ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .error-box {
    background: rgba(255, 68, 68, 0.1);
    border: 1px solid #ff4444;
    padding: 16px;
    border-radius: 12px;
    color: #ff6666;
    margin-top: 20px;
    animation: slideUp 0.6s ease-out;
    font-size: 13px;
  }
</style>

<div class="container">
  <div class="header">
    <h1>FACE ANALYZER</h1>
    <p>Detailed facial aesthetics rating powered by AI</p>
  </div>

  <div class="key-input-section">
    <h3>⚙️ Step 1: Add Your API Key</h3>
    <p>Get a free key from <a href="https://console.groq.com/keys" target="_blank">Groq Console</a> and paste it here:</p>
    <div class="input-wrapper">
      <input 
        type="password" 
        id="apiKeyInput" 
        placeholder="gsk_your_api_key_here" 
      />
      <button class="toggle-btn" id="toggleBtn">Show</button>
    </div>
    <div class="button-group">
      <button class="save-key-btn" id="saveKeyBtn">Save Key</button>
    </div>
    <div class="key-status empty" id="keyStatus">⏳ Enter your API key and click Save</div>
  </div>

  <div class="camera-container" id="cameraContainer">
    <video id="video" autoplay playsinline></video>
    <div id="scanOverlay" class="scan-overlay">
      <div class="scan-line"></div>
    </div>
  </div>

  <div class="controls">
    <button class="scan-btn" id="scanBtn" disabled>SCAN FACE</button>
  </div>

  <div id="resultsContainer"></div>
</div>

<script>
let mediaStream;
let countdownInterval;
let isScanning = false;
let apiKey = localStorage.getItem('groqApiKey') || '';
let showPassword = false;

const apiKeyInput = document.getElementById('apiKeyInput');
const saveKeyBtn = document.getElementById('saveKeyBtn');
const toggleBtn = document.getElementById('toggleBtn');
const keyStatus = document.getElementById('keyStatus');
const scanBtn = document.getElementById('scanBtn');

// Load saved key
if (apiKey) {
  apiKeyInput.value = apiKey;
  updateKeyStatus('valid', '✓ API Key loaded successfully!');
  scanBtn.disabled = false;
}

// Toggle password visibility
toggleBtn.addEventListener('click', (e) => {
  showPassword = !showPassword;
  apiKeyInput.type = showPassword ? 'text' : 'password';
  toggleBtn.textContent = showPassword ? 'Hide' : 'Show';
});

// Save key button
saveKeyBtn.addEventListener('click', (e) => {
  console.log('Save button clicked!');
  const key = apiKeyInput.value.trim();
  
  if (!key) {
    updateKeyStatus('empty', '❌ Please enter an API key');
    return;
  }
  
  if (!key.startsWith('gsk_')) {
    updateKeyStatus('invalid', '❌ Invalid! Key should start with gsk_');
    return;
  }
  
  apiKey = key;
  localStorage.setItem('groqApiKey', key);
  updateKeyStatus('valid', '✓ API Key saved successfully!');
  scanBtn.disabled = false;
  
  if (!mediaStream) {
    initCamera();
  }
});

function updateKeyStatus(status, message) {
  keyStatus.className = `key-status ${status}`;
  keyStatus.textContent = message;
}

async function initCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    document.getElementById('video').srcObject = mediaStream;
    document.getElementById('cameraContainer').classList.add('active');
  } catch (err) {
    alert('Unable to access camera. Please check permissions.');
    console.error(err);
  }
}

function startCountdown() {
  const overlay = document.getElementById('scanOverlay');
  let count = 5;

  overlay.classList.add('active');

  countdownInterval = setInterval(() => {
    if (count > 0) {
      const countdownEl = document.createElement('div');
      countdownEl.className = 'countdown';
      countdownEl.textContent = count;
      overlay.appendChild(countdownEl);

      setTimeout(() => countdownEl.remove(), 1000);
      count--;
    } else {
      clearInterval(countdownInterval);
      overlay.classList.remove('active');
      captureFace();
    }
  }, 1000);
}

async function captureFace() {
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  const imageData = canvas.toDataURL('image/jpeg', 0.9);
  analyzeWithGroq(imageData);
}

async function analyzeWithGroq(imageData) {
  const resultsContainer = document.getElementById('resultsContainer');
  resultsContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Analyzing face...</p></div>';

  try {
    const base64Image = imageData.split(',')[1];

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        messages: [
          {
            role: 'user',
            content: [
              {
                type: 'text',
                text: `Analyze this face photo in detail. For each facial feature, provide a rating from 1.0 to 10.0 (using one decimal place like 1.1, 1.2, etc.). Rate these specific elements:

1. Eyes (size, shape, depth)
2. Eye Spacing (distance between eyes)
3. Eye Area (overall quality)
4. Eyebrows (shape, thickness, arch)
5. Nose (shape, symmetry, size)
6. Nostrils (shape and size)
7. Lips (fullness, color, symmetry)
8. Mouth Area (overall)
9. Jawline (definition, shape, projection)
10. Chin (prominence, shape)
11. Cheekbones (prominence, shape)
12. Face Shape (overall structure)
13. Symmetry (bilateral symmetry)
14. Skin (texture, clarity, tone)
15. Overall Facial Harmony

Format your response as JSON ONLY with this structure (no other text):
{
  "eyes": 7.5,
  "eyeSpacing": 7.2,
  "eyeArea": 7.4,
  "eyebrows": 7.1,
  "nose": 7.3,
  "nostrils": 7.0,
  "lips": 7.6,
  "mouthArea": 7.4,
  "jawline": 7.8,
  "chin": 7.5,
  "cheekbones": 7.2,
  "faceShape": 7.4,
  "symmetry": 7.6,
  "skin": 7.3,
  "overallHarmony": 7.5
}`,
              },
              {
                type: 'image_url',
                image_url: {
                  url: `data:image/jpeg;base64,${base64Image}`,
                },
              },
            ],
          },
        ],
        max_tokens: 500,
      }),
    });

    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.error?.message || 'API request failed');
    }

    const data = await response.json();
    const analysisText = data.choices[0].message.content;
    
    const jsonMatch = analysisText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) {
      throw new Error('Could not parse response as JSON');
    }

    const ratings = JSON.parse(jsonMatch[0]);
    displayResults(ratings);
  } catch (err) {
    console.error('Full error:', err);
    resultsContainer.innerHTML = `<div class="error-box"><strong>Error:</strong> ${err.message}<br><br>Make sure your API key is valid and has access to vision models.</div>`;
  }

  document.getElementById('scanBtn').disabled = false;
  isScanning = false;
}

function calculateTier(overall) {
  if (overall >= 9) return { name: 'MOGGER', class: 'tier-mogger' };
  if (overall >= 7) return { name: 'CHAD', class: 'tier-chad' };
  if (overall >= 5) return { name: 'SUB5', class: 'tier-sub5' };
  if (overall >= 3) return { name: 'SUB3', class: 'tier-sub3' };
  return { name: 'CHOPPED', class: 'tier-chopped' };
}

function displayResults(ratings) {
  const overall = (Object.values(ratings).reduce((a, b) => a + b) / Object.values(ratings).length).toFixed(1);
  const tier = calculateTier(overall);

  const resultsContainer = document.getElementById('resultsContainer');
  resultsContainer.innerHTML = '';

  const tierBadge = document.createElement('div');
  tierBadge.className = `tier-badge ${tier.class}`;
  tierBadge.textContent = `${tier.name} - ${overall}/10`;
  tierBadge.style.animation = 'slideUp 0.6s ease-out';
  resultsContainer.appendChild(tierBadge);

  const grid = document.createElement('div');
  grid.className = 'ratings-grid';

  const labels = {
    eyes: 'Eyes',
    eyeSpacing: 'Eye Spacing',
    eyeArea: 'Eye Area',
    eyebrows: 'Eyebrows',
    nose: 'Nose',
    nostrils: 'Nostrils',
    lips: 'Lips',
    mouthArea: 'Mouth Area',
    jawline: 'Jawline',
    chin: 'Chin',
    cheekbones: 'Cheekbones',
    faceShape: 'Face Shape',
    symmetry: 'Symmetry',
    skin: 'Skin',
    overallHarmony: 'Overall Harmony',
  };

  Object.entries(ratings).forEach(([key, value], index) => {
    const card = document.createElement('div');
    card.className = 'rating-card';
    card.style.setProperty('--i', index);
    card.innerHTML = `
      <div class="rating-label">${labels[key] || key}</div>
      <div class="rating-value">${value.toFixed(1)}</div>
    `;
    grid.appendChild(card);
  });

  resultsContainer.appendChild(grid);
}

scanBtn.addEventListener('click', () => {
  if (!isScanning && apiKey) {
    isScanning = true;
    document.getElementById('scanBtn').disabled = true;
    startCountdown();
  }
});
</script>
