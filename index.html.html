<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f3460">
  <title>MOGGER - Face Rating App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      overflow: hidden;
      height: 100vh;
    }

    .app-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      position: relative;
    }

    .home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      text-align: center;
      background: linear-gradient(180deg, #0f3460 0%, #1a1a2e 100%);
    }

    .logo {
      font-size: 64px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .app-title {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .app-subtitle {
      font-size: 14px;
      color: #8aa6d4;
      margin-bottom: 60px;
      font-weight: 500;
    }

    .start-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      border: none;
      cursor: pointer;
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
      transition: all 0.3s ease;
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { 
        box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 20px 80px rgba(0, 212, 255, 0.5);
        transform: scale(1.05);
      }
    }

    .start-btn:active {
      transform: scale(0.95);
    }

    .camera-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: #000;
    }

    .camera-screen.active {
      display: flex;
    }

    .camera-header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .camera-title {
      font-size: 18px;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 2px;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .close-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }

    .video-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .scan-border {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 250px;
      border: 3px solid #00d4ff;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
      animation: scan-pulse 2s ease-in-out infinite;
    }

    @keyframes scan-pulse {
      0%, 100% { 
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        border-color: #00d4ff;
      }
      50% { 
        box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
        border-color: #00ffff;
      }
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, transparent);
      animation: slide-down 2s ease-in-out infinite;
    }

    @keyframes slide-down {
      0% { top: 0%; }
      100% { top: 100%; }
    }

    .countdown-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      font-weight: 900;
      color: #00d4ff;
      text-shadow: 0 0 40px #00d4ff;
      opacity: 0;
      animation: countdown-pop 1s ease-out forwards;
      z-index: 5;
    }

    @keyframes countdown-pop {
      0% { 
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.3);
      }
      60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.3);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .camera-footer {
      padding: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
    }

    .scan-button {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      border: 4px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .scan-button:active {
      transform: scale(0.9);
    }

    .scan-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .results-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(180deg, #0f3460 0%, #1a1a2e 100%);
      overflow-y: auto;
      padding-bottom: 20px;
    }

    .results-screen.active {
      display: flex;
    }

    .results-header {
      padding: 20px;
      text-align: center;
      background: rgba(0, 212, 255, 0.05);
      border-bottom: 2px solid rgba(0, 212, 255, 0.2);
    }

    .tier-badge {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .tier-mogger {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #78350f;
    }

    .tier-chad {
      background: linear-gradient(135deg, #34d399, #10b981);
      color: #065f46;
    }

    .tier-sub5 {
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      color: #fff;
    }

    .tier-sub3 {
      background: linear-gradient(135deg, #f87171, #ef4444);
      color: #fff;
    }

    .tier-chopped {
      background: linear-gradient(135deg, #a78bfa, #8b5cf6);
      color: #fff;
    }

    .overall-score {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 10px 0;
    }

    .results-content {
      padding: 20px;
      flex: 1;
    }

    .ratings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .rating-item {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 153, 255, 0.05));
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 16px;
      padding: 16px;
      animation: slide-in 0.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rating-label {
      font-size: 11px;
      color: #8aa6d4;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .rating-value {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn-retry {
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      color: #000;
    }

    .btn-retry:active {
      transform: scale(0.95);
    }

    .btn-home {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: #00d4ff;
    }

    .btn-home:active {
      background: rgba(0, 212, 255, 0.1);
    }

    .loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(180deg, #0f3460 0%, #1a1a2e 100%);
    }

    .loading-screen.active {
      display: flex;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(0, 212, 255, 0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 16px;
      color: #8aa6d4;
      font-weight: 600;
    }

    .error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px 20px;
      background: linear-gradient(180deg, #0f3460 0%, #1a1a2e 100%);
      text-align: center;
    }

    .error-screen.active {
      display: flex;
    }

    .error-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .error-title {
      font-size: 24px;
      color: #ff6b6b;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .error-message {
      color: #8aa6d4;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .error-btn {
      padding: 14px 40px;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .error-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Home Screen -->
  <div class="home-screen" id="homeScreen">
    <div class="logo">📸</div>
    <div class="app-title">MOGGER</div>
    <div class="app-subtitle">Rate Your Face Like Never Before</div>
    <button class="start-btn" id="startBtn">→</button>
  </div>

  <!-- Camera Screen -->
  <div class="camera-screen" id="cameraScreen">
    <div class="camera-header">
      <div class="camera-title">MOGGER</div>
      <button class="close-btn" id="closeBtn">✕</button>
    </div>
    <div class="video-container">
      <video id="video" autoplay playsinline></video>
      <div class="scan-overlay">
        <div class="scan-border">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <div class="camera-footer">
      <button class="scan-button" id="scanButtonCamera">📷</button>
    </div>
  </div>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Analyzing...</div>
  </div>

  <!-- Results Screen -->
  <div class="results-screen" id="resultsScreen">
    <div class="results-header">
      <div class="tier-badge" id="tierBadge"></div>
      <div class="overall-score" id="overallScore">7.5</div>
      <div style="color: #8aa6d4; font-size: 12px; margin-top: 8px;">Overall Rating</div>
    </div>
    <div class="results-content">
      <div class="ratings-grid" id="ratingsGrid"></div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-retry" id="retryBtn">Scan Again</button>
      <button class="btn btn-home" id="homeBtn">Home</button>
    </div>
  </div>

  <!-- Error Screen -->
  <div class="error-screen" id="errorScreen">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Oops!</div>
    <div class="error-message" id="errorMessage">Something went wrong. Please try again.</div>
    <button class="error-btn" id="errorRetryBtn">Try Again</button>
  </div>
</div>

<script>
const API_KEY = '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';
let mediaStream;
let isScanning = false;

const homeScreen = document.getElementById('homeScreen');
const cameraScreen = document.getElementById('cameraScreen');
const loadingScreen = document.getElementById('loadingScreen');
const resultsScreen = document.getElementById('resultsScreen');
const errorScreen = document.getElementById('errorScreen');

const startBtn = document.getElementById('startBtn');
const closeBtn = document.getElementById('closeBtn');
const scanButtonCamera = document.getElementById('scanButtonCamera');
const retryBtn = document.getElementById('retryBtn');
const homeBtn = document.getElementById('homeBtn');
const errorRetryBtn = document.getElementById('errorRetryBtn');

startBtn.addEventListener('click', initCamera);
closeBtn.addEventListener('click', () => showScreen('home'));
scanButtonCamera.addEventListener('click', startScanning);
retryBtn.addEventListener('click', () => {
  scanButtonCamera.disabled = false;
  showScreen('camera');
});
homeBtn.addEventListener('click', () => showScreen('home'));
errorRetryBtn.addEventListener('click', () => showScreen('camera'));

async function initCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1920 } }
    });
    document.getElementById('video').srcObject = mediaStream;
    showScreen('camera');
  } catch (err) {
    showError('Camera access denied. Please enable camera permissions.');
  }
}

function startScanning() {
  if (isScanning) return;
  isScanning = true;
  scanButtonCamera.disabled = true;
  
  let countdown = 5;
  const overlay = document.querySelector('.scan-overlay');
  
  const timer = setInterval(() => {
    if (countdown > 0) {
      const countEl = document.createElement('div');
      countEl.className = 'countdown-display';
      countEl.textContent = countdown;
      overlay.appendChild(countEl);
      
      setTimeout(() => countEl.remove(), 1000);
      countdown--;
    } else {
      clearInterval(timer);
      captureFace();
    }
  }, 1000);
}

async function captureFace() {
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  
  const imageData = canvas.toDataURL('image/jpeg', 0.85);
  analyzeWithGroq(imageData);
}

async function analyzeWithGroq(imageData) {
  showScreen('loading');
  
  try {
    const base64Image = imageData.split(',')[1];

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${API_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        messages: [
          {
            role: 'user',
            content: [
              {
                type: 'text',
                text: `Analyze this face in detail. Rate each feature 1-10 with one decimal (1.1 to 10.0):

1. Eyes - 2. Eye Spacing - 3. Eye Area - 4. Eyebrows - 5. Nose - 6. Nostrils - 7. Lips - 8. Mouth Area - 9. Jawline - 10. Chin - 11. Cheekbones - 12. Face Shape - 13. Symmetry - 14. Skin - 15. Overall Harmony

RESPOND WITH ONLY THIS JSON FORMAT (no other text):
{"eyes":7.5,"eyeSpacing":7.2,"eyeArea":7.4,"eyebrows":7.1,"nose":7.3,"nostrils":7.0,"lips":7.6,"mouthArea":7.4,"jawline":7.8,"chin":7.5,"cheekbones":7.2,"faceShape":7.4,"symmetry":7.6,"skin":7.3,"overallHarmony":7.5}`,
              },
              {
                type: 'image_url',
                image_url: {
                  url: `data:image/jpeg;base64,${base64Image}`,
                },
              },
            ],
          },
        ],
        max_tokens: 500,
      }),
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API Error');
    }

    const data = await response.json();
    const text = data.choices[0].message.content;
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    
    if (!jsonMatch) {
      throw new Error('Invalid response format');
    }

    const ratings = JSON.parse(jsonMatch[0]);
    displayResults(ratings);
  } catch (err) {
    console.error(err);
    showError(err.message || 'Analysis failed. Try again.');
  }
}

function displayResults(ratings) {
  const overall = (Object.values(ratings).reduce((a, b) => a + b) / Object.values(ratings).length).toFixed(1);
  
  const tiers = [
    { min: 9, name: 'MOGGER', class: 'tier-mogger' },
    { min: 7, name: 'CHAD', class: 'tier-chad' },
    { min: 5, name: 'SUB5', class: 'tier-sub5' },
    { min: 3, name: 'SUB3', class: 'tier-sub3' },
    { min: 0, name: 'CHOPPED', class: 'tier-chopped' },
  ];
  
  const tier = tiers.find(t => overall >= t.min);
  
  document.getElementById('tierBadge').className = `tier-badge ${tier.class}`;
  document.getElementById('tierBadge').textContent = tier.name;
  document.getElementById('overallScore').textContent = overall;
  
  const labels = {
    eyes: 'Eyes', eyeSpacing: 'Eye Spacing', eyeArea: 'Eye Area', eyebrows: 'Eyebrows',
    nose: 'Nose', nostrils: 'Nostrils', lips: 'Lips', mouthArea: 'Mouth', jawline: 'Jawline',
    chin: 'Chin', cheekbones: 'Cheekbones', faceShape: 'Face Shape', symmetry: 'Symmetry',
    skin: 'Skin', overallHarmony: 'Harmony'
  };
  
  const grid = document.getElementById('ratingsGrid');
  grid.innerHTML = '';
  
  Object.entries(ratings).forEach(([key, value], index) => {
    const item = document.createElement('div');
    item.className = 'rating-item';
    item.style.animationDelay = `${index * 0.05}s`;
    item.innerHTML = `
      <div class="rating-label">${labels[key] || key}</div>
      <div class="rating-value">${value.toFixed(1)}</div>
    `;
    grid.appendChild(item);
  });
  
  showScreen('results');
}

function showScreen(screen) {
  homeScreen.classList.remove('active');
  cameraScreen.classList.remove('active');
  loadingScreen.classList.remove('active');
  resultsScreen.classList.remove('active');
  errorScreen.classList.remove('active');
  
  if (screen === 'home') homeScreen.classList.add('active');
  else if (screen === 'camera') cameraScreen.classList.add('active');
  else if (screen === 'loading') loadingScreen.classList.add('active');
  else if (screen === 'results') resultsScreen.classList.add('active');
  else if (screen === 'error') errorScreen.classList.add('active');
  
  if (screen !== 'camera' && mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
  }
  
  isScanning = false;
  scanButtonCamera.disabled = false;
}

function showError(message) {
  document.getElementById('errorMessage').textContent = message;
  showScreen('error');
}
</script>
</body>
</html>
